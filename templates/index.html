<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olayemi Portfolio AI</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1921527020474760"
     crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --input-bg: #f5f5f5;
      --bubble-bg: #e8e8e8;
      --btn-color: #ffffff;
      --sidebar-width: 270px;
      --thinking-color: #888888;
      --accent-color: #007bff;
      --code-bg: #f0f0f0;
      --code-text: #333;
    }
    body.dark {
      --bg-color: #0d0d0d;
      --text-color: #f0f0f0;
      --input-bg: #1a1a1a;
      --bubble-bg: #2a2a2a;
      --btn-color: #ffffff;
      --thinking-color: #aaaaaa;
      --accent-color: #4da6ff;
      --code-bg: #1e1e1e;
      --code-text: #d4d4d4;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background-color: var(--bg-color);
      border-bottom: 1px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 { margin: 0; font-size: 1.2rem; font-weight: 600; }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 20px; width: 20px;
      left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent-color); }
    input:checked + .slider:before { transform: translateX(24px); }
    .menu-btn { font-size: 1.6rem; background: none; border: none; cursor: pointer; margin-right: 15px; color: var(--text-color); }
    .dropdown {
      position: fixed; top: 0; left: -270px;
      width: var(--sidebar-width); height: 100vh; background: var(--bg-color);
      display: flex; flex-direction: column; justify-content: space-between;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2); transition: left 0.35s ease; z-index: 30;
    }
    .dropdown.active { left: 0; }
    .dropdown-content { display: flex; flex-direction: column; justify-content: space-evenly; flex: 1; padding: 20px 0; }
    .dropdown-content a {
      text-align: left; padding: 12px 20px; text-decoration: none;
      font-size: 1rem; font-weight: bold; border-radius: 6px; color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }
    .dropdown-content a:hover { background: var(--input-bg); color: var(--accent-color); }
    .dropdown-footer { padding: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; border-top: 1px solid #ccc; }
    .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; }
    .placeholder { text-align: center; color: gray; margin-top: 20px; }
    
    .message { margin: 8px 0; word-wrap: break-word; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .user { 
      background: var(--accent-color); 
      color: white;
      padding: 12px 16px; 
      border-radius: 18px 18px 4px 18px; 
      align-self: flex-end; 
      max-width: 75%; 
      text-align: left;
      font-size: 0.95rem;
    }
    .bot { 
      align-self: flex-start; 
      padding: 0; 
      text-align: left; 
      max-width: 85%;
      font-size: 0.95rem;
    }
    .bot-content {
      padding: 12px 16px;
      background: var(--bubble-bg);
      border-radius: 18px 18px 18px 4px;
    }
    
    /* Formatted text inside bot messages */
    .bot-content p { margin: 0 0 10px 0; }
    .bot-content p:last-child { margin-bottom: 0; }
    .bot-content strong, .bot-content b { font-weight: 700; color: var(--text-color); }
    .bot-content em, .bot-content i { font-style: italic; }
    .bot-content ul, .bot-content ol { margin: 8px 0; padding-left: 20px; }
    .bot-content li { margin: 4px 0; }
    .bot-content code {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }
    .bot-content pre {
      background: var(--code-bg);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bot-content pre code {
      background: none;
      padding: 0;
    }
    .bot-content blockquote {
      border-left: 3px solid var(--accent-color);
      margin: 10px 0;
      padding-left: 12px;
      color: var(--thinking-color);
    }
    .bot-content h1, .bot-content h2, .bot-content h3, .bot-content h4 {
      margin: 12px 0 8px 0;
      font-weight: 600;
    }
    .bot-content hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 12px 0;
    }
    .bot-content a {
      color: var(--accent-color);
      text-decoration: none;
    }
    .bot-content a:hover {
      text-decoration: underline;
    }
    
    /* Thinking animation */
    .thinking {
      color: var(--thinking-color);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bubble-bg);
      border-radius: 18px 18px 18px 4px;
    }
    .thinking-dots {
      display: flex;
      gap: 4px;
    }
    .thinking-dots span {
      width: 6px;
      height: 6px;
      background: var(--thinking-color);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    .chatbox { 
      display: flex; 
      padding: 12px 20px; 
      border-top: 1px solid #ccc; 
      background-color: var(--bg-color); 
      position: sticky; 
      bottom: 0;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    .chatbox textarea { 
      flex: 1; 
      border: none; 
      outline: none; 
      font-size: 1rem; 
      padding: 10px 14px; 
      resize: none; 
      min-height: 44px; 
      max-height: 150px; 
      overflow-y: auto; 
      background: var(--input-bg); 
      color: var(--text-color); 
      border-radius: 22px;
      font-family: inherit;
    }
    .chatbox button { 
      background: var(--accent-color); 
      border: none; 
      color: var(--btn-color); 
      padding: 0; 
      margin-left: 10px; 
      border-radius: 50%; 
      cursor: pointer; 
      font-size: 1.2rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      width: 44px; 
      height: 44px; 
      flex-shrink: 0;
    }
    .chatbox button:hover { opacity: 0.9; }
    .spinner { 
      border: 3px solid rgba(255, 255, 255, 0.3); 
      border-top: 3px solid white; 
      border-radius: 50%; 
      width: 18px; 
      height: 18px; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1>OLAYEMI PORTFOLIO AI</h1>
    </div>
    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </header>

  <div class="dropdown" id="dropdown">
    <div class="dropdown-content">
      <a href="#">New Chat</a>
      <a href="#">Dashboard</a>
      <a href="#">Projects</a>
      <a href="#">Resume</a>
      <a href="#">Contact</a>
      <a href="#">About</a>
    </div>
    <div class="dropdown-footer">OLAYEMI PORTFOLIO MENU BAR</div>
  </div>

  <div class="chat" id="chat">
    <div class="placeholder" id="placeholder">What can I help you with about Olayemi?</div>
  </div>

  <div class="chatbox">
    <textarea id="userInput" rows="1" placeholder="Type your question..."></textarea>
    <button id="sendBtn">➤</button>
  </div>

  <script>
    // ==========================================
    // MARKDOWN TO HTML CONVERTER
    // ==========================================
    function markdownToHTML(text) {
      if (!text) return '';
      
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      
      // Code blocks (``` ... ```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      
      // Inline code (`...`)
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // Bold (**...**)
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
      // Italic (*...* or _..._)
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/_(.*?)_/g, '<em>$1</em>');
      
      // Strikethrough (~~...~~)
      html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');
      
      // Headers
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      
      // Blockquote
      html = html.replace(/^&gt; (.*$)/gim, '<blockquote>$1</blockquote>');
      
      // Horizontal rule
      html = html.replace(/^---$/gim, '<hr>');
      
      // Unordered lists
      html = html.replace(/^[\*\-] (.*$)/gim, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/<\/ul>\s*<ul>/g, '');
      
      // Ordered lists
      html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
      
      // Links [text](url)
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // Line breaks to paragraphs
      const paragraphs = html.split(/\n\s*\n/).filter(p => p.trim());
      html = paragraphs.map(p => {
        p = p.trim();
        if (p.startsWith('<') && (p.endsWith('>') || p.includes('</'))) {
          return p;
        }
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
      
      return html;
    }

    const menuLinks = document.querySelectorAll('.dropdown-content a');
    const chatContainer = document.getElementById('chat');

    const sections = {
      "New Chat": `<div class="placeholder">Starting a new chat... Ask me anything about Olayemi.</div>`,
      "Dashboard": `
        <div class="message bot">
          <div class="bot-content">
            <h3>📊 Dashboard Overview</h3>
            <p>Welcome to your AI-powered dashboard. Here's what I can display:</p>
            <ul>
              <li><strong>Project Progress</strong>: Track ongoing builds and milestones.</li>
              <li><strong>Performance</strong>: Real-time insights into your portfolio growth.</li>
              <li><strong>AI Assistant</strong>: Manage chats, generate reports, and handle client requests.</li>
            </ul>
          </div>
        </div>
      `,
      "Projects": `
        <div class="message bot">
          <div class="bot-content">
            <h3>💼 Featured Projects</h3>
            <ul>
              <li><strong><a href="https://legendavid-cbt-portal-demo.vercel.app" target="_blank">CBT Portal</a></strong> – Full online testing system with result automation and admin dashboard.</li>
              <li><strong><a href="https://legendavid-portfolio-ai.vercel.app" target="_blank">Portfolio AI</a></strong> – AI-driven interactive portfolio.</li>
              <li><strong><a href="https://legendavid-dashboard.vercel.app" target="_blank">Smart Dashboard</a></strong> – Modern responsive admin panel.</li>
            </ul>
          </div>
        </div>
      `,
      "Resume": `
        <div class="message bot">
          <div class="bot-content">
            <h3>📄 Resume</h3>
            <p><strong>Name:</strong> Olayemi David</p>
            <p><strong>Role:</strong> Full Stack Developer | AI Integrator | Innovator</p>
            <p><strong>Skills:</strong> PHP, MySQL, JavaScript, React, Node.js, API Integration, Cloud Hosting</p>
            <p><strong>Experience:</strong> Built and deployed full-scale applications using modular architecture and AI-enhanced UX flows.</p>
            <p><strong>Contact:</strong> See contact page below.</p>
            <div style="margin-top:15px; text-align:center;">
              <a href="static/cv/Copy-David_Olayemi_CV 1.pdf" 
                 download 
                 style="display:inline-block; padding:12px 20px; background:var(--accent-color); color:white; border-radius:6px; text-decoration:none; font-weight:bold;">
                ⬇️ Download Resume (PDF)
              </a>
            </div>
          </div>
        </div>
      `,
      "Contact": `
        <div class="message bot">
          <div class="bot-content">
            <h3>📬 Contact Information</h3>
            <p><strong>Name:</strong> Olayemi David</p>
            <p><strong>Email:</strong> <a href="mailto:olabolade999@gmail.com">olabolade999@gmail.com</a></p>
            <p><strong>Phone:</strong> <a href="tel:+2349022996320">+234 902 299 6320</a></p>
            <p><strong>GitHub:</strong> <a href="https://github.com/LegenDavid-Abo" target="_blank">github.com/LegenDavid-Abo</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://linkedin.com/in/olayemi-david-3b1132340" target="_blank">linkedin.com/in/olayemi-david-3b1132340</a></p>
          </div>
        </div>
      `,
      "About": `
        <div class="message bot">
          <div class="bot-content">
            <h3>👤 About Olayemi</h3>
            <p>Olayemi David is a visionary developer merging design precision with AI-driven solutions.  
            Passionate about human-centered technology, automation, and clean architecture,  
            he builds systems that are not just functional but intelligent.</p>
          </div>
        </div>
      `
    };

    menuLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const section = e.target.textContent.trim();
        dropdown.classList.remove('active');
        chatContainer.innerHTML = sections[section] || `<div class='placeholder'>Section under development...</div>`;
      });
    });

    const menuBtn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('dropdown');
    const themeToggle = document.getElementById('themeToggle');
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const placeholder = document.getElementById('placeholder');

    let loading = false;

    menuBtn.addEventListener('click', () => { dropdown.classList.toggle('active'); });
    chat.addEventListener('click', () => { dropdown.classList.remove('active'); });
    themeToggle.addEventListener('change', () => { document.body.classList.toggle('dark'); });

    function addMessage(text, sender, isHTML = false) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      
      if (sender === 'bot') {
        const contentDiv = document.createElement('div');
        contentDiv.classList.add('bot-content');
        if (isHTML) {
          contentDiv.innerHTML = text;
        } else {
          contentDiv.textContent = text;
        }
        msg.appendChild(contentDiv);
      } else {
        msg.textContent = text;
      }
      
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    function showThinking() {
      const thinkingDiv = document.createElement('div');
      thinkingDiv.classList.add('message', 'bot', 'thinking');
      thinkingDiv.id = 'thinkingIndicator';
      thinkingDiv.innerHTML = `
        <span>Thinking</span>
        <div class="thinking-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      chat.appendChild(thinkingDiv);
      chat.scrollTop = chat.scrollHeight;
      return thinkingDiv;
    }

    function removeThinking() {
      const thinking = document.getElementById('thinkingIndicator');
      if (thinking) thinking.remove();
    }

    async function sendMessage() {
      if (loading) return;
      const text = userInput.value.trim();
      if (text === "") return;
      if (placeholder) placeholder.remove();

      addMessage(text, 'user');
      userInput.value = "";
      userInput.style.height = "44px";
      sendBtn.innerHTML = '<div class="spinner"></div>';

      loading = true;
      showThinking();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: text})
        });
        const data = await res.json();

        removeThinking();

        const formattedHTML = markdownToHTML(data.reply);
        addMessage(formattedHTML, 'bot', true);

      } catch(e) {
        removeThinking();
        addMessage("⚠️ Connection lost — Please check your internet connection.", 'bot', true);
      } finally {
        loading = false;
        sendBtn.textContent = "➤";
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', e => {
      if(e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', () => {
      userInput.style.height = "auto";
      userInput.style.height = (userInput.scrollHeight) + "px";
    });
  </script>
</body>
</html>
